name: CI on Main Merge

on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  docker-ci:
    if: ${{ github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build and start development container
        run: docker compose up -d --build mbp-t02-childlock-dev

      - name: Run unit test and coverage in container
        run: |
          docker compose exec -T mbp-t02-childlock-dev bash -lc "
            cd /workspace &&
            make clean &&
            make test &&
            make coverage
          "

      - name: Run complexity check in container
        run: |
          docker compose exec -T mbp-t02-childlock-dev bash -lc "
            cd /workspace &&
            python3 -m lizard src include tests
          "

      - name: Stop and clean containers
        if: always()
        run: docker compose down --volumes --remove-orphans
